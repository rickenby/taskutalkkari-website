<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna palautetta – Taskutalkkari</title>
  <meta name="description" content="Anna palautetta Taskutalkkarista. Kaikki palaute on meille arvokasta sovelluksen kehittämiseksi." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="back-link">← Taskutalkkari</a>
    <h1>Anna palautetta</h1>
    <p>Auta meitä kehittämään Taskutalkkaria. Kaikki palaute on arvokasta!</p>
  </header>

  <main class="page-main">
    <form
      class="feedback-form"
      action="https://api.web3forms.com/submit"
      method="POST"
    >
      <!-- Web3Forms -asetukset — korvaa SINUN-AVAIMESI osoitteessa https://web3forms.com -->
      <input type="hidden" name="access_key" value="SINUN-AVAIMESI" />
      <input type="hidden" name="subject" value="Palaute – Taskutalkkari" />
      <input type="hidden" name="redirect" value="https://taskutalkkari.fi/kiitos.html" />
      <input type="checkbox" name="botcheck" style="display:none" />

      <div class="form-group">
        <label for="name">Nimi <span class="optional">(vapaaehtoinen)</span></label>
        <input type="text" id="name" name="name" placeholder="Etunimi Sukunimi" />
      </div>

      <div class="form-group">
        <label for="email">Sähköposti <span class="optional">(vapaaehtoinen – jos haluat vastauksen)</span></label>
        <input type="email" id="email" name="email" placeholder="sinä@example.fi" />
      </div>

      <div class="form-group">
        <label for="category">Palautteen tyyppi</label>
        <select id="category" name="category">
          <option value="kehitysidea">Kehitysidea</option>
          <option value="bugi">Bugi / virhe</option>
          <option value="kysymys">Kysymys</option>
          <option value="muu">Muu palaute</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Viesti <span class="required">*</span></label>
        <textarea id="message" name="message" rows="6" placeholder="Kerro vapaasti..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">Lähetä palaute</button>
    </form>
  </main>

  <footer class="site-footer">
    <nav class="footer-links">
      <a href="palaute.html">Anna palautetta</a>
      <a href="tietosuoja.html">Tietosuojaseloste</a>
      <a href="kayttoehdot.html">Käyttöehdot</a>
    </nav>
    <p class="footer-copy">&copy; 2025–2026 Taskutalkkari</p>
  </footer>
</body>
</html>
